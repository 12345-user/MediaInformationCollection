name: 数据采集

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2,8,14,20 * * *'  # 每6小时自动采集

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 运行数据采集
        run: python collectors/run.py

      - name: 提交数据更新
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add data/latest_data.json
          git diff --cached --quiet || git commit -m "data: 更新数据 $(date -u '+%Y-%m-%dT%H:%MZ')"
          git push
